[env:esp32-relay-node]
platform = espressif32
board = esp32dev
framework = arduino
upload_protocol = esptool
upload_speed = 115200
monitor_speed = 115200

upload_flags =
  --before=no_reset
  --after=no_reset

lib_deps =
  knolleary/PubSubClient@^2.8
  bblanchon/ArduinoJson@^7.1.0

build_flags =
  -DCORE_DEBUG_LEVEL=3